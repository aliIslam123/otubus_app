name: otubus_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ==============================
  # PROJECT PACKAGES (MERGED)
  # ==============================

  # State Management
  provider: ^6.1.2

  # QR Code Generator
  qr_flutter: ^4.1.0

  # Location + Maps
  location: ^6.0.0
  google_maps_flutter: ^2.6.1
  geolocator: ^12.0.0

  # Open Links
  url_launcher: ^6.3.2

  # Date / Time Formatting
  intl: ^0.19.0

  # Sharing
  share_plus: ^10.1.0

  # PDF Create + Print
  pdf: ^3.11.1
  printing: ^5.11.1

  # File System Access
  path_provider: ^2.1.3

  # Screenshot
  screenshot: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/